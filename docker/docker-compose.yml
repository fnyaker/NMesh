services:
  node_1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      MODE: host
      NODE_ADDR: "0.0.0.0:9000"
      NODE_COUNT: "9"
    volumes:
      - shared_data:/data

  node_2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      MODE: join
      NODE_ADDR: "0.0.0.0:9001"
      HOST_ADDR: "node_1:9000"
      NODE_INDEX: "2"
    depends_on: [node_1]
    volumes:
      - shared_data:/data

