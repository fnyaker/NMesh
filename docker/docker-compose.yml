# A single relay node: mesh TCP open to the world, web console kept on the host
# loopback by default. Bring it up with: docker compose -f docker/docker-compose.yml up -d
services:
  nmesh:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: nmesh:latest
    restart: unless-stopped
    environment:
      NMESH_LISTEN: "0.0.0.0:9000"
      NMESH_CONSOLE_HOST: "0.0.0.0"
      NMESH_CONSOLE_PORT: "8787"
    ports:
      - "9000:9000"                 # mesh TCP — reachable so this node can relay
      - "127.0.0.1:8787:8787"       # web console — host loopback only by default;
                                    # change to "8787:8787" to expose it (TLS + password).
    volumes:
      - nmesh_data:/data            # identity, certs, sessions, console password persist here

volumes:
  nmesh_data:
