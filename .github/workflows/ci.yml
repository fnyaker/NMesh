name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps for liboqs
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build gcc libssl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build liboqs (first import compiles the C library)
        run: python -c "import oqs; print('liboqs ready')"

      - name: Unit tests
        run: pytest -q

      - name: Integration tests
        run: pytest tests/integration -q
