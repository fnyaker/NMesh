name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # Run the suite inside the published base image, which already carries a
  # compiled liboqs + all deps (see docker/Dockerfile.base, base-image.yml). That
  # avoids recompiling the heavy C library on every run and tests on the exact
  # runtime the app ships with. If the base isn't reachable (first bootstrap, or
  # a fork PR without package read) we build it once locally so CI still goes
  # green — same pull-or-build fallback as the docker job below.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Base image name (lowercased)
        id: img
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-base" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Provide the base image (prebuilt liboqs; build once if unreachable)
        run: |
          BASE='${{ steps.img.outputs.base }}:latest'
          if docker pull "$BASE" 2>/dev/null; then
            echo "using published base image with prebuilt liboqs: $BASE"
          else
            echo "base image not reachable — building it locally"
            docker build -f docker/Dockerfile.base -t "$BASE" .
          fi
          echo "BASE=$BASE" >> "$GITHUB_ENV"

      - name: Unit tests (in the base image — liboqs already compiled)
        run: |
          docker run --rm -v "$PWD:/app" -w /app "$BASE" \
            sh -c "python -c 'import oqs; print(\"liboqs ready (prebuilt)\")' && pytest -q"

      - name: Integration tests
        run: docker run --rm -v "$PWD:/app" -w /app "$BASE" pytest tests/integration -q

  # Build the application image on every run so a broken Dockerfile fails CI,
  # and publish it to GHCR (ghcr.io/<owner>/nmesh) only on pushes to main — PRs
  # (including from forks) build but never push, since they lack write creds.
  #
  # The heavy liboqs layer lives in a separate base image built by
  # base-image.yml. Here we reuse the published base (pulling it) and only when
  # it isn't reachable — first bootstrap, or a fork PR without package access —
  # build it locally so CI still goes green. The app image then layers only the
  # NMesh code on top, so this job is fast whenever the base is available.
  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Image names (lowercased)
        id: img
        run: |
          repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "app=ghcr.io/$repo" >> "$GITHUB_OUTPUT"
          echo "base=ghcr.io/$repo-base" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Provide the base image (pull if published, else build locally)
        run: |
          BASE='${{ steps.img.outputs.base }}:latest'
          if docker pull "$BASE" 2>/dev/null; then
            echo "using published base image $BASE"
          else
            echo "base image not reachable — building it locally"
            docker build -f docker/Dockerfile.base -t "$BASE" .
          fi

      - name: Build the application image
        run: |
          docker build -f docker/Dockerfile \
            --build-arg BASE_IMAGE='${{ steps.img.outputs.base }}:latest' \
            -t '${{ steps.img.outputs.app }}:latest' \
            -t '${{ steps.img.outputs.app }}:${{ github.sha }}' .

      - name: Push the application image (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push '${{ steps.img.outputs.app }}:latest'
          docker push '${{ steps.img.outputs.app }}:${{ github.sha }}'
