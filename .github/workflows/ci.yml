name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps for liboqs
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build gcc libssl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build liboqs (first import compiles the C library)
        run: python -c "import oqs; print('liboqs ready')"

      - name: Unit tests
        run: pytest -q

      - name: Integration tests
        run: pytest tests/integration -q

  # Build the application image on every run so a broken Dockerfile fails CI,
  # and publish it to GHCR (ghcr.io/<owner>/nmesh) only on pushes to main — PRs
  # (including from forks) build but never push, since they lack write creds.
  #
  # The heavy liboqs layer lives in a separate base image built by
  # base-image.yml. Here we reuse the published base (pulling it) and only when
  # it isn't reachable — first bootstrap, or a fork PR without package access —
  # build it locally so CI still goes green. The app image then layers only the
  # NMesh code on top, so this job is fast whenever the base is available.
  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Image names (lowercased)
        id: img
        run: |
          repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "app=ghcr.io/$repo" >> "$GITHUB_OUTPUT"
          echo "base=ghcr.io/$repo-base" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Provide the base image (pull if published, else build locally)
        run: |
          BASE='${{ steps.img.outputs.base }}:latest'
          if docker pull "$BASE" 2>/dev/null; then
            echo "using published base image $BASE"
          else
            echo "base image not reachable — building it locally"
            docker build -f docker/Dockerfile.base -t "$BASE" .
          fi

      - name: Build the application image
        run: |
          docker build -f docker/Dockerfile \
            --build-arg BASE_IMAGE='${{ steps.img.outputs.base }}:latest' \
            -t '${{ steps.img.outputs.app }}:latest' \
            -t '${{ steps.img.outputs.app }}:${{ github.sha }}' .

      - name: Push the application image (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push '${{ steps.img.outputs.app }}:latest'
          docker push '${{ steps.img.outputs.app }}:${{ github.sha }}'
