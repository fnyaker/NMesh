# Publishes the NMesh base image (Python + compiled liboqs) to GHCR.
#
# The base is the expensive, rarely-changing layer, so it is built here on its
# own rather than on every CI run: only when the dependency set (requirements.txt)
# or the base Dockerfile changes on main, plus on-demand via the Actions tab.
# The application image (docker/Dockerfile) then builds FROM this published base.
name: base-image

on:
  push:
    branches: [ main ]
    paths:
      - requirements.txt
      - docker/Dockerfile.base
      - .github/workflows/base-image.yml
  workflow_dispatch:

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Base image name (lowercased)
        id: img
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-base" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.base
          push: true
          tags: ${{ steps.img.outputs.base }}:latest
